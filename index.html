<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💚 Bond Chat</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Login Page -->
    <div id="loginPage" class="login-box">

        <h1>💚 Bond Chat</h1>
        <p>Stay Connected Forever ❤️</p>

        <input
            id="name"
            type="text"
            placeholder="👤 Enter Your Name">

        <input
            id="email"
            type="email"
            placeholder="📧 Enter Email">

        <input
            id="password"
            type="password"
            placeholder="🔒 Enter Password">

        <button id="signupBtn">
            Create Account
        </button>

        <button id="loginBtn">
            Login
        </button>

    </div>


    <!-- Chat Page -->

    <div id="chatPage" style="display:none;">

        <header class="topbar">

            <div class="profile">

                <img
                    src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                    id="profilePic">

                <div>

                    <h2>💚 Bond Chat</h2>

                    <small id="status">
                        🟢 Online
                    </small>

                </div>

            </div>

            <button id="logoutBtn">
                Logout
            </button>

        </header>


        <div id="chat"></div>


        <div class="bottom">

            <input
                id="msg"
                type="text"
                placeholder="Type a message...">

            <button id="sendBtn">
                ➤
            </button>

        </div>

    </div>

    <script type="module" src="script.js"></script>

</body>

</html>
