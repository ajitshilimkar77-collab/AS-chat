<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bond Chat</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Login Page -->
<div id="loginPage" class="login-box">

<h2>💚 Bond Chat</h2>

<input
id="name"
type="text"
placeholder="Enter Your Name">

<br><br>

<input
id="email"
type="email"
placeholder="Enter Email">

<br><br>

<input
id="password"
type="password"
placeholder="Enter Password">

<br><br>

<button id="loginBtn">
Login
</button>

<button id="signupBtn">
Create Account
</button>

</div>

<!-- Chat Page -->
<div id="chatPage" style="display:none;">

<h2>💚 Bond Chat</h2>

<div id="chat"></div>

<div class="bottom">

<input
id="msg"
type="text"
placeholder="Type a message...">

<button id="sendBtn">
Send
</button>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
