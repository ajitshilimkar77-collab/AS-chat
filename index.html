<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💚 Bond Chat</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#25D366">

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="loginPage">

    <div class="loginBox">

        <h1>💚 Bond Chat</h1>

        <p>Stay Connected Forever ❤️</p>

        <input
        id="name"
        type="text"
        placeholder="👤 Enter Your Name">

        <input
        id="email"
        type="email"
        placeholder="📧 Enter Email">

        <input
        id="password"
        type="password"
        placeholder="🔒 Enter Password">

        <button id="signupBtn">
            Create Account
        </button>

        <button id="loginBtn">
            Login
        </button>

    </div>

</div>

<!-- CHAT PAGE -->

<div id="chatPage" style="display:none;">

<header class="topBar">

<div class="left">

<img
id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<div>

<h2>💚 Bond Chat</h2>

<small id="status">
🟢 Online
</small>

</div>

</div>

<div class="right">

<button id="searchBtn">
🔍
</button>

<button id="profileBtn">
👤
</button>

<button id="logoutBtn">
🚪
</button>

</div>

</header>

<!-- CHAT -->

<div id="chat"></div>

<!-- MESSAGE BOX -->

<div class="bottom">

<button id="emojiBtn">
😊
</button>

<input
id="msg"
type="text"
placeholder="Type Message...">

<button id="imageBtn">
📷
</button>

<button id="sendBtn">
➤
</button>

</div>

</div>

<script type="module" src="script.js"></script>
    <script type="module" src="chat.js"></script>
<script type="module" src="profile.js"></script>

<script>
if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("./service-worker.js");

});

}
</script>

</body>

</html>
